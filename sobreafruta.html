<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🍓 Frutas - Escolha Inteligente</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">
        🍎 Escolha Inteligente
    </div>

    <nav>
        <a href="index.html">Voltar</a>
    </nav>

</header>

<section class="hero mini-hero">

    <div class="hero-texto">

        <h1>🍓 Frutas</h1>

        <p>Aprenda a identificar o estado das frutas de forma simples e visual.</p>

    </div>

</section>

<section class="secao">

    <h2 class="titulo-secao">🔎 Estados da fruta</h2>

    <div class="cards">

        <div class="card">
            <img src="https://www.gov.br/saude/...png" alt="Fruta em crescimento">
            <h3>Em crescimento</h3>
            <p>Fruta ainda em desenvolvimento.</p>
        </div>

        <div class="card">
            <img src="https://cptstatic.s3.amazonaws.com/...jpg" alt="Fruta madura">
            <h3>Madura</h3>
            <p>Pronta para consumo.</p>
        </div>

        <div class="card">
            <img src="https://www.valeshop.com.br/...jpg" alt="Fruta estragada">
            <h3>Estragada</h3>
            <p>Não deve ser consumida.</p>
        </div>

    </div>

</section>

<footer class="footer">

    <p>💚 Projeto Escolha Inteligente</p>

</footer>

</body>
</html>
